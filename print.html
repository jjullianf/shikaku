<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shikaku — Print Export</title>
<style>
/* ── Screen UI ─────────────────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Georgia', serif;
  background: #e8e4d8;
  color: #1a1916;
}
#ui {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: #1a1916;
  color: #faf9f5;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  z-index: 100;
}
#ui h1 { font-size: .85rem; letter-spacing: .1em; font-weight: 400; }
#ui p { font-size: .72rem; color: #a8a69e; letter-spacing: .04em; }
.ui-btns { display: flex; gap: 10px; align-items: center; }
.btn {
  font-family: 'Courier New', monospace;
  font-size: .72rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 8px 18px;
  border: 1px solid #4a4840;
  background: transparent;
  color: #faf9f5;
  cursor: pointer;
  border-radius: 3px;
}
.btn:hover { background: #2a2926; }
.btn-gold { background: #8a6f3a; border-color: #8a6f3a; color: #faf9f5; }
.btn-gold:hover { background: #c4a565; border-color: #c4a565; }
#progress {
  font-size: .7rem;
  color: #c4a565;
  letter-spacing: .06em;
}
#book { margin-top: 56px; }

/* ── Page layout ────────────────────────────────────────────────────────────── */
/* A5 = 148mm × 210mm */
.page {
  width: 148mm;
  min-height: 210mm;
  background: #faf9f5;
  margin: 12px auto;
  padding: 14mm 12mm 12mm;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* Cover page */
.cover-page {
  align-items: center;
  justify-content: center;
  gap: 24px;
  text-align: center;
}
.cover-title {
  font-size: 2.4rem;
  font-weight: 400;
  letter-spacing: .2em;
  color: #1a1916;
  line-height: 1.2;
}
.cover-subtitle {
  font-size: .75rem;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: #8a8880;
}
.cover-rule { width: 40mm; height: 1px; background: #c4a565; margin: 8px auto; }
.cover-count { font-size: .7rem; color: #8a8880; letter-spacing: .12em; }
.cover-grid-deco {
  display: grid;
  grid-template-columns: repeat(5, 9mm);
  grid-template-rows: repeat(5, 9mm);
  gap: 1.5px;
  margin: 16px auto;
}
.cover-grid-deco span {
  background: #e8e4d8;
  border-radius: 1px;
}
.cover-grid-deco span.lit { background: #c4a565; }

/* Rules page */
.rules-page { justify-content: flex-start; gap: 0; }
.rules-title {
  font-size: 1rem;
  letter-spacing: .12em;
  font-weight: 400;
  margin-bottom: 10mm;
  color: #1a1916;
  border-bottom: 1px solid #c4a565;
  padding-bottom: 4mm;
}
.rules-text {
  font-size: .7rem;
  line-height: 1.85;
  color: #4a4840;
  letter-spacing: .02em;
  margin-bottom: 6mm;
}
.rules-example {
  display: flex;
  gap: 10mm;
  align-items: flex-start;
  margin: 8mm 0;
}
.rules-step {
  font-size: .65rem;
  color: #8a8880;
  letter-spacing: .06em;
  margin-bottom: 3mm;
  text-transform: uppercase;
}

/* Section divider page */
.section-page {
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-align: center;
}
.section-name {
  font-size: 1.6rem;
  letter-spacing: .2em;
  font-weight: 400;
  color: #1a1916;
}
.section-detail {
  font-size: .65rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: #8a8880;
}
.section-rule { width: 24mm; height: 1px; background: #c4a565; margin: 6px auto; }
.section-count { font-size: .65rem; color: #c4a565; letter-spacing: .1em; }

/* Puzzle page */
.puzzle-page { justify-content: space-between; }
.puzzle-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 5mm;
}
.puzzle-number {
  font-size: .65rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #8a8880;
  font-family: 'Courier New', monospace;
}
.puzzle-difficulty {
  font-size: .6rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: #c4a565;
}
.puzzle-canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.puzzle-canvas-wrap canvas {
  max-width: 100%;
  max-height: 140mm;
}
.puzzle-footer {
  display: flex;
  justify-content: center;
  margin-top: 5mm;
}
.page-num {
  font-size: .55rem;
  color: #c4a565;
  letter-spacing: .1em;
  font-family: 'Courier New', monospace;
}

/* Solutions section */
.solutions-header {
  font-size: .9rem;
  letter-spacing: .14em;
  font-weight: 400;
  margin-bottom: 8mm;
  color: #1a1916;
  border-bottom: 1px solid #c4a565;
  padding-bottom: 3mm;
}
.solutions-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6mm;
}
.solution-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2mm;
}
.solution-label {
  font-size: .55rem;
  color: #8a8880;
  letter-spacing: .1em;
  font-family: 'Courier New', monospace;
}

/* Back cover */
.back-cover {
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  background: #1a1916;
}
.back-title { font-size: 1.4rem; letter-spacing: .2em; color: #c4a565; }
.back-url { font-size: .65rem; letter-spacing: .16em; color: #8a8880; font-family: 'Courier New', monospace; }
.back-rule { width: 24mm; height: 1px; background: #4a4840; margin: 4px auto; }

/* ── Print styles ──────────────────────────────────────────────────────────── */
@media print {
  @page { size: A5; margin: 0; }
  body { background: white; }
  #ui { display: none; }
  #book { margin-top: 0; }
  .page {
    margin: 0;
    page-break-after: always;
    page-break-inside: avoid;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .back-cover { background: #1a1916 !important; }
}
</style>
</head>
<body>

<div id="ui">
  <div>
    <h1>Shikaku — Print Export</h1>
    <p>Open in Chrome · File → Print → Save as PDF · Paper: A5 · Margins: None</p>
  </div>
  <div class="ui-btns">
    <span id="progress">Generating puzzles...</span>
    <button class="btn" onclick="window.print()">Print / Save PDF</button>
  </div>
</div>

<div id="book"></div>

<script>
// ── Puzzle generator ──────────────────────────────────────────────────────────
function mulberry32(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296};}
function maxRectArea(rows,cols){const c=rows*cols;if(c<=25)return 6;if(c<=100)return 10;if(c<=400)return 32;return 52;}
function generateSimplePuzzle(rows,cols,seed){const rng=mulberry32(seed),rects=[],grid=Array.from({length:rows},()=>new Array(cols).fill(-1)),clues=Array.from({length:rows},()=>new Array(cols).fill(0));for(let r=0;r<rows;r++){let c=0;while(c<cols){const w=(c+1<cols&&rng()>.5)?2:1,aw=Math.min(w,cols-c),id=rects.length,cc2=c+Math.floor(rng()*aw);rects.push({r1:r,c1:c,r2:r,c2:c+aw-1,clueR:r,clueC:cc2,area:aw});for(let x=c;x<c+aw;x++){grid[r][x]=id;clues[r][x]=0;}clues[r][cc2]=aw;c+=aw;}}return{rows,cols,clues,solution:rects,grid};}
function generatePuzzle(rows,cols,seed){const rng=mulberry32(seed),maxArea=maxRectArea(rows,cols),grid=Array.from({length:rows},()=>new Array(cols).fill(-1)),rects=[];let attempts=0;while(true){let startR=-1,startC=-1;outer:for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(grid[r][c]===-1){startR=r;startC=c;break outer;}if(startR===-1)break;let placed=false;const maxH=Math.min(rows-startR,maxArea),maxW=Math.min(cols-startC,maxArea),cands=[];for(let h=1;h<=maxH;h++)for(let w=1;w<=maxW;w++)if(h*w<=maxArea)cands.push([h,w]);for(let i=cands.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[cands[i],cands[j]]=[cands[j],cands[i]];}for(const[h,w]of cands){let fits=true;for(let r=startR;r<startR+h&&fits;r++)for(let c=startC;c<startC+w&&fits;c++)if(grid[r][c]!==-1)fits=false;if(!fits)continue;const id=rects.length,clueR=startR+Math.floor(rng()*h),clueC=startC+Math.floor(rng()*w);for(let r=startR;r<startR+h;r++)for(let c=startC;c<startC+w;c++)grid[r][c]=id;rects.push({r1:startR,c1:startC,r2:startR+h-1,c2:startC+w-1,clueR,clueC,area:h*w});placed=true;break;}if(!placed){attempts++;if(attempts>300)return generateSimplePuzzle(rows,cols,seed+attempts);for(let r=0;r<rows;r++)grid[r].fill(-1);rects.length=0;rng();rng();}}const clues=Array.from({length:rows},()=>new Array(cols).fill(0));for(const rect of rects)clues[rect.clueR][rect.clueC]=rect.area;return{rows,cols,clues,solution:rects,grid};}

// ── Render puzzle to canvas ───────────────────────────────────────────────────
function renderPuzzle(canvas, puzzle, showSolution) {
  const {rows, cols, clues, solution} = puzzle;
  const dpr = window.devicePixelRatio || 1;

  // Cell size: fit puzzle into ~120mm at 96dpi ≈ 453px, max
  const maxPx = Math.min(424, Math.floor(100 * 3.7795)); // ~378px for 100mm
  const cs = Math.floor(Math.min(maxPx / cols, maxPx / rows));

  canvas.width  = cols * cs * dpr;
  canvas.height = rows * cs * dpr;
  canvas.style.width  = (cols * cs) + 'px';
  canvas.style.height = (rows * cs) + 'px';

  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Background
  ctx.fillStyle = '#faf9f5';
  ctx.fillRect(0, 0, cols*cs, rows*cs);

  // Solution rects
  if (showSolution && solution) {
    for (const p of solution) {
      const x=p.c1*cs, y=p.r1*cs, w=(p.c2-p.c1+1)*cs, h=(p.r2-p.r1+1)*cs;
      ctx.fillStyle = 'rgba(45,135,75,0.1)';
      ctx.fillRect(x+1, y+1, w-2, h-2);
      ctx.strokeStyle = 'rgba(45,135,75,0.65)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x+1, y+1, w-2, h-2);
    }
  }

  // Grid lines
  for (let r=0; r<=rows; r++) {
    ctx.strokeStyle = (r%5===0) ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0.08)';
    ctx.lineWidth   = (r%5===0) ? 1 : 0.5;
    ctx.beginPath(); ctx.moveTo(0, r*cs); ctx.lineTo(cols*cs, r*cs); ctx.stroke();
  }
  for (let c=0; c<=cols; c++) {
    ctx.strokeStyle = (c%5===0) ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0.08)';
    ctx.lineWidth   = (c%5===0) ? 1 : 0.5;
    ctx.beginPath(); ctx.moveTo(c*cs, 0); ctx.lineTo(c*cs, rows*cs); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(0,0,0,0.35)';
  ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, cols*cs-2, rows*cs-2);

  // Clue numbers
  const fs = Math.max(Math.floor(cs * 0.42), 8);
  ctx.font = `600 ${fs}px "Courier New", monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#1a1916';
  for (let r=0; r<rows; r++)
    for (let c=0; c<cols; c++)
      if (clues[r][c] > 0)
        ctx.fillText(clues[r][c], c*cs + cs/2, r*cs + cs/2);
}

// ── Book definition ───────────────────────────────────────────────────────────
const SECTIONS = [
  { name: 'Starter',  rows:  5, cols:  5, count: 40, seed: 1000 },
  { name: 'Classic',  rows: 10, cols: 10, count: 35, seed: 2000 },
  { name: 'Hard',     rows: 20, cols: 20, count: 25, seed: 3000 },
  { name: 'Expert',   rows: 25, cols: 25, count: 20, seed: 4000 },
];
const TOTAL = SECTIONS.reduce((s,x)=>s+x.count, 0);

// ── Page builders ─────────────────────────────────────────────────────────────
function makePage(...classes) {
  const d = document.createElement('div');
  d.className = 'page ' + classes.join(' ');
  return d;
}

function buildCover() {
  const p = makePage('cover-page');
  p.innerHTML = `
    <div class="cover-rule"></div>
    <div class="cover-title">shikaku</div>
    <div class="cover-subtitle">A book of puzzles</div>
    <div class="cover-rule"></div>
    <div class="cover-grid-deco" id="cover-deco"></div>
    <div class="cover-count">${TOTAL} puzzles · four difficulty levels · A5 softcover</div>
    <div style="margin-top:auto;font-size:.55rem;letter-spacing:.12em;color:#c4a565">shikaku.ch</div>`;
  return p;
}

function buildRules() {
  const p = makePage('rules-page');
  p.innerHTML = `
    <div class="rules-title">How to play</div>
    <p class="rules-text">Shikaku is a Japanese logic puzzle. The goal is simple: divide the entire grid into non-overlapping rectangles so that each rectangle contains exactly one number, and that number equals the area of its rectangle.</p>
    <p class="rules-text"><strong>The rules:</strong></p>
    <p class="rules-text">1 · Every cell in the grid must belong to exactly one rectangle.<br>
    2 · Each rectangle must contain exactly one clue number.<br>
    3 · The clue number equals the area of the rectangle — width × height.<br>
    4 · Rectangles cannot overlap or extend outside the grid.</p>
    <p class="rules-text"><strong>Example:</strong> A cell showing the number 6 must be part of a 1×6, 2×3, 3×2, or 6×1 rectangle. A cell showing 1 is a rectangle all by itself.</p>
    <p class="rules-text"><strong>Tips:</strong> Start with the largest numbers — they have fewer possible rectangle shapes. Corner and edge clues are also easier to place since their options are limited by the grid boundary.</p>
    <div style="margin-top:auto">
      <p class="rules-text" style="font-size:.6rem;color:#8a8880">Puzzles in this book were generated using the algorithm at shikaku.ch. Each puzzle has a unique solution. Solutions are provided at the back.</p>
    </div>`;
  return p;
}

function buildSectionDivider(section, puzzleStart) {
  const p = makePage('section-page');
  p.innerHTML = `
    <div class="section-rule"></div>
    <div class="section-name">${section.name.toLowerCase()}</div>
    <div class="section-detail">${section.rows} × ${section.cols} grid</div>
    <div class="section-rule"></div>
    <div class="section-count">${section.count} puzzles · #${puzzleStart}–${puzzleStart + section.count - 1}</div>`;
  return p;
}

function buildPuzzlePage(puzzle, number, difficulty, pageNum) {
  const p = makePage('puzzle-page');
  p.innerHTML = `
    <div class="puzzle-header">
      <span class="puzzle-number">Puzzle ${number}</span>
      <span class="puzzle-difficulty">${difficulty}</span>
    </div>
    <div class="puzzle-canvas-wrap"><canvas></canvas></div>
    <div class="puzzle-footer"><span class="page-num">${pageNum}</span></div>`;
  renderPuzzle(p.querySelector('canvas'), puzzle, false);
  return p;
}

// Solutions: pack multiple small puzzles per page
function buildSolutionPages(allPuzzles) {
  const pages = [];
  // Group by size for compact layout
  const groups = SECTIONS.map(s => ({
    name: s.name,
    puzzles: allPuzzles.filter(x => x.section === s.name)
  }));

  for (const group of groups) {
    // How many per page depends on grid size
    const perPage = group.puzzles[0].puzzle.cols <= 5 ? 6
                  : group.puzzles[0].puzzle.cols <= 10 ? 4
                  : group.puzzles[0].puzzle.cols <= 20 ? 2 : 1;

    for (let i = 0; i < group.puzzles.length; i += perPage) {
      const p = makePage('puzzle-page');
      const header = document.createElement('div');
      header.className = 'solutions-header';
      header.textContent = i === 0 ? `Solutions — ${group.name}` : `Solutions — ${group.name} (cont.)`;
      p.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'solutions-grid';
      grid.style.gridTemplateColumns = `repeat(${Math.min(perPage, 3)}, 1fr)`;

      const chunk = group.puzzles.slice(i, i + perPage);
      for (const {num, puzzle} of chunk) {
        const item = document.createElement('div');
        item.className = 'solution-item';
        const lbl = document.createElement('div');
        lbl.className = 'solution-label';
        lbl.textContent = `#${num}`;
        const canvas = document.createElement('canvas');
        item.appendChild(canvas);
        item.appendChild(lbl);
        grid.appendChild(item);
        renderPuzzle(canvas, puzzle, true);
      }
      p.appendChild(grid);
      pages.push(p);
    }
  }
  return pages;
}

function buildBackCover() {
  const p = makePage('back-cover');
  p.innerHTML = `
    <div class="back-rule"></div>
    <div class="back-title">shikaku</div>
    <div class="back-url">shikaku.ch</div>
    <div class="back-rule"></div>`;
  return p;
}

// ── Assemble book ─────────────────────────────────────────────────────────────
function buildBook() {
  const book = document.getElementById('book');
  const allPuzzles = [];
  let puzzleNumber = 1;
  let pageNumber = 3; // cover + rules = pages 1-2

  // Cover
  book.appendChild(buildCover());

  // Rules
  book.appendChild(buildRules());

  // Sections
  for (const section of SECTIONS) {
    book.appendChild(buildSectionDivider(section, puzzleNumber));
    pageNumber++;

    for (let i = 0; i < section.count; i++) {
      const seed = section.seed + i;
      const puzzle = generatePuzzle(section.rows, section.cols, seed);
      allPuzzles.push({ num: puzzleNumber, puzzle, section: section.name });
      book.appendChild(buildPuzzlePage(puzzle, puzzleNumber, section.name, pageNumber));
      puzzleNumber++;
      pageNumber++;
    }
  }

  // Solutions
  const solPages = buildSolutionPages(allPuzzles);
  for (const sp of solPages) book.appendChild(sp);

  // Back cover
  book.appendChild(buildBackCover());

  // Cover grid decoration
  const deco = document.getElementById('cover-deco');
  if (deco) {
    const lit = [1,3,7,8,12,16,18,20,22,24];
    for (let i=0; i<25; i++) {
      const s = document.createElement('span');
      if (lit.includes(i)) s.className = 'lit';
      deco.appendChild(s);
    }
  }

  document.getElementById('progress').textContent =
    `${TOTAL} puzzles ready — ${document.querySelectorAll('.page').length} pages total`;
}

// Generate after a short delay so page renders first
setTimeout(buildBook, 100);
</script>
</body>
</html>
