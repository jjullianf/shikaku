:root{--ink:#1a1916;--ink2:#4a4840;--ink3:#8a8880;--paper:#faf9f5;--paper2:#f0ede5;--paper3:#e8e4d8;--gold:#8a6f3a;--gold2:#c4a565;--border:rgba(26,25,22,0.12);--shadow:0 2px 20px rgba(26,25,22,0.08);--r:4px;--t:0.18s ease}

<script>
// ── PUZZLE GENERATOR ────────────────────────────────────────────────────────
function mulberry32(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296};}
function getDailySeed(){const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}
function maxRectArea(rows,cols){const c=rows*cols;if(c<=25)return 6;if(c<=100)return 10;if(c<=400)return 16;return 20;}
function generateSimplePuzzle(rows,cols,seed){const rng=mulberry32(seed),rects=[],grid=Array.from({length:rows},()=>new Array(cols).fill(-1)),clues=Array.from({length:rows},()=>new Array(cols).fill(0));for(let r=0;r<rows;r++){let c=0;while(c<cols){const w=(c+1<cols&&rng()>.5)?2:1,aw=Math.min(w,cols-c),id=rects.length,cc2=c+Math.floor(rng()*aw);rects.push({r1:r,c1:c,r2:r,c2:c+aw-1,clueR:r,clueC:cc2,area:aw});for(let x=c;x<c+aw;x++){grid[r][x]=id;clues[r][x]=0;}clues[r][cc2]=aw;c+=aw;}}return{rows,cols,clues,solution:rects,grid};}
function generatePuzzle(rows,cols,seed){const rng=mulberry32(seed),maxArea=maxRectArea(rows,cols),grid=Array.from({length:rows},()=>new Array(cols).fill(-1)),rects=[];let attempts=0;while(true){let startR=-1,startC=-1;outer:for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(grid[r][c]===-1){startR=r;startC=c;break outer;}if(startR===-1)break;let placed=false;const maxH=Math.min(rows-startR,maxArea),maxW=Math.min(cols-startC,maxArea),cands=[];for(let h=1;h<=maxH;h++)for(let w=1;w<=maxW;w++)if(h*w<=maxArea)cands.push([h,w]);for(let i=cands.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[cands[i],cands[j]]=[cands[j],cands[i]];}for(const[h,w]of cands){let fits=true;for(let r=startR;r<startR+h&&fits;r++)for(let c=startC;c<startC+w&&fits;c++)if(grid[r][c]!==-1)fits=false;if(!fits)continue;const id=rects.length,clueR=startR+Math.floor(rng()*h),clueC=startC+Math.floor(rng()*w);for(let r=startR;r<startR+h;r++)for(let c=startC;c<startC+w;c++)grid[r][c]=id;rects.push({r1:startR,c1:startC,r2:startR+h-1,c2:startC+w-1,clueR,clueC,area:h*w});placed=true;break;}if(!placed){attempts++;if(attempts>300)return generateSimplePuzzle(rows,cols,seed+attempts);for(let r=0;r<rows;r++)grid[r].fill(-1);rects.length=0;rng();rng();}}const clues=Array.from({length:rows},()=>new Array(cols).fill(0));for(const rect of rects)clues[rect.clueR][rect.clueC]=rect.area;return{rows,cols,clues,solution:rects,grid};}

// ── GAME ENGINE ─────────────────────────────────────────────────────────────
// Cell size in puzzle-space (always rendered at this resolution, then zoomed)
const BASE_CELL = 52;

class ShikakuGame {
  constructor(puzzle, canvas, wrap) {
    this.puzzle = puzzle;
    this.canvas = canvas;
    this.wrap = wrap;
    this.ctx = canvas.getContext('2d');
    this.playerRects = [];
    this.solved = false;
    this.startTime = Date.now();
    this.onSolve = null;

    // View transform: panX/panY in screen pixels, zoom = scale factor
    this.zoom = 1;
    this.panX = 0;
    this.panY = 0;

    // Interaction state
    this.mode = 'idle'; // 'idle' | 'draw' | 'pan'
    this.drawStart = null;
    this.drawCurrent = null;
    this.preview = null;

    // Track if pointer moved significantly (to distinguish click from drag)
    this.pointerMoved = false;
    this.pointerDownPos = null;

    this._setupCanvas();
    this._bindEvents();
    this._fitToWrap();
    this.render();
  }

  // ── Setup ──
  _setupCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const {rows, cols} = this.puzzle;
    const maxW = Math.min(this.wrap.clientWidth || 800, 800);
    // Make canvas height match the puzzle's aspect ratio, up to 85vh
    const aspect = rows / cols;
    const maxH = Math.min(window.innerHeight * 0.85, maxW * aspect);
    const w = Math.min(maxW, maxH / aspect);
    const h = w * aspect;
    this.wrap.style.height = Math.round(h) + 'px';
    this.canvas.width = Math.round(w) * dpr;
    this.canvas.height = Math.round(h) * dpr;
    this.ctx.scale(dpr, dpr);
    this._W = Math.round(w);
    this._H = Math.round(h);
  }

  _fitToWrap() {
    const {rows, cols} = this.puzzle;
    const puzzleW = cols * BASE_CELL;
    const puzzleH = rows * BASE_CELL;
    const fitZoom = Math.min(this._W / puzzleW, this._H / puzzleH) * 0.96;
    this.zoom = fitZoom;
    this.panX = (this._W - puzzleW * this.zoom) / 2;
    this.panY = (this._H - puzzleH * this.zoom) / 2;
    this._updateZoomLabel();
  }

  _updateZoomLabel() {
    const el = document.getElementById('zoom-level');
    if (el) el.textContent = Math.round(this.zoom * 100) + '%';
  }

  // ── Coordinate conversion ──
  // Screen (canvas element) → puzzle space
  _screenToWorld(sx, sy) {
    return {
      x: (sx - this.panX) / this.zoom,
      y: (sy - this.panY) / this.zoom
    };
  }

  _worldToCell(wx, wy) {
    const c = Math.floor(wx / BASE_CELL);
    const r = Math.floor(wy / BASE_CELL);
    const {rows, cols} = this.puzzle;
    if (r < 0 || r >= rows || c < 0 || c >= cols) return null;
    return {r, c};
  }

  _screenToCell(sx, sy) {
    const w = this._screenToWorld(sx, sy);
    return this._worldToCell(w.x, w.y);
  }

  // Get event position relative to canvas element (logical pixels)
  _evPos(e, touch) {
    const rect = this.canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const src = touch || (e.touches ? e.touches[0] : e);
    // getBoundingClientRect gives CSS pixels; canvas is dpr× larger
    // but we already scaled ctx, so just use CSS px
    return {
      x: src.clientX - rect.left,
      y: src.clientY - rect.top
    };
  }

  // ── Zoom/Pan ──
  _clampPan() {
    const {rows, cols} = this.puzzle;
    const pw = cols * BASE_CELL * this.zoom;
    const ph = rows * BASE_CELL * this.zoom;
    // Always keep at least half the puzzle visible on each axis
    const minVisible = 0.5;
    this.panX = Math.max(-(pw * (1 - minVisible)), Math.min(this._W * minVisible, this.panX));
    this.panY = Math.max(-(ph * (1 - minVisible)), Math.min(this._H * minVisible, this.panY));
  }

  fitToScreen() {
    this._fitToWrap();
    this.render();
  }

  zoomAt(factor, sx, sy) {
    const newZoom = Math.max(0.15, Math.min(8, this.zoom * factor));
    const f = newZoom / this.zoom;
    this.panX = sx - f * (sx - this.panX);
    this.panY = sy - f * (sy - this.panY);
    this.zoom = newZoom;
    this._clampPan();
    this._updateZoomLabel();
    this.render();
  }

  zoomIn()  { this.zoomAt(1.35, this._W/2, this._H/2); }
  zoomOut() { this.zoomAt(1/1.35, this._W/2, this._H/2); }

  // ── Rect logic ──
  _rectIsValid(p) {
    const clues = this.puzzle.clues;
    const area = (p.r2-p.r1+1)*(p.c2-p.c1+1);
    let cnt=0, val=0;
    for(let r=p.r1;r<=p.r2;r++) for(let c=p.c1;c<=p.c2;c++) if(clues[r][c]>0){cnt++;val=clues[r][c];}
    return cnt===1 && val===area;
  }

  _rectAt(r, c) {
    return this.playerRects.find(p => p.r1<=r && p.r2>=r && p.c1<=c && p.c2>=c) || null;
  }

  placeRect(r1,c1,r2,c2) {
    // Remove overlapping rects
    this.playerRects = this.playerRects.filter(p => !(p.r1<=r2&&p.r2>=r1&&p.c1<=c2&&p.c2>=c1));
    this.playerRects.push({r1,c1,r2,c2});
    this.render();
    this._checkSolution();
  }

  eraseAt(r,c) {
    this.playerRects = this.playerRects.filter(p => !(p.r1<=r&&p.r2>=r&&p.c1<=c&&p.c2>=c));
    this.render();
  }

  _checkSolution() {
    const {rows,cols,clues} = this.puzzle;
    const cov = Array.from({length:rows},()=>new Array(cols).fill(0));
    for(const p of this.playerRects) for(let r=p.r1;r<=p.r2;r++) for(let c=p.c1;c<=p.c2;c++) cov[r][c]++;
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) if(cov[r][c]!==1) return;
    for(const p of this.playerRects) if(!this._rectIsValid(p)) return;
    this.solved = true;
    this.render();
    if(this.onSolve) this.onSolve(Math.floor((Date.now()-this.startTime)/1000));
  }

  reset() {
    this.playerRects=[];this.solved=false;this.startTime=Date.now();
    this.mode='idle';this.preview=null;this.render();
  }

  resize() {
    const dpr = window.devicePixelRatio || 1;
    const {rows, cols} = this.puzzle;
    const maxW = Math.min(this.wrap.clientWidth || 800, 800);
    const aspect = rows / cols;
    const maxH = Math.min(window.innerHeight * 0.85, maxW * aspect);
    const w = Math.min(maxW, maxH / aspect);
    const h = w * aspect;
    this.wrap.style.height = Math.round(h) + 'px';
    this.canvas.width = Math.round(w) * dpr;
    this.canvas.height = Math.round(h) * dpr;
    this.ctx.scale(dpr, dpr);
    this._W = Math.round(w);
    this._H = Math.round(h);
    this._fitToWrap();
    this.render();
  }

  // ── Events ──
  _bindEvents() {
    const c = this.canvas;

    // ── Mouse ──
    c.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      if (this.solved) return;
      const pos = this._evPos(e);
      this.pointerDownPos = pos;
      this.pointerMoved = false;
      const cell = this._screenToCell(pos.x, pos.y);
      if (!cell) return;

      // Click on invalid rect → erase it immediately
      const existing = this._rectAt(cell.r, cell.c);
      if (existing && !this._rectIsValid(existing)) {
        this.eraseAt(cell.r, cell.c);
        this.pointerDownPos = null;
        return;
      }

      this.mode = 'draw';
      this.drawStart = cell;
      this.drawCurrent = cell;
      this.preview = {r1:cell.r,c1:cell.c,r2:cell.r,c2:cell.c};
      this.render();
    });

    c.addEventListener('mousemove', e => {
      if (this.mode === 'idle') return;
      const pos = this._evPos(e);
      if (this.pointerDownPos) {
        const dx = pos.x - this.pointerDownPos.x;
        const dy = pos.y - this.pointerDownPos.y;
        if (Math.hypot(dx,dy) > 4) this.pointerMoved = true;
      }

      if (this.mode === 'pan') {
        // Middle mouse or space+drag for pan (handled below)
        return;
      }

      if (this.mode === 'draw' && this.drawStart) {
        const cell = this._screenToCell(pos.x, pos.y);
        if (cell) {
          this.drawCurrent = cell;
          this.preview = {
            r1:Math.min(this.drawStart.r,cell.r), c1:Math.min(this.drawStart.c,cell.c),
            r2:Math.max(this.drawStart.r,cell.r), c2:Math.max(this.drawStart.c,cell.c)
          };
          this.render();
        }
      }
    });

    c.addEventListener('mouseup', e => {
      if (this.mode === 'draw' && this.drawStart) {
        if (!this.pointerMoved) {
          // Pure click — erase if rect already here, otherwise place 1×1
          const existing = this._rectAt(this.drawStart.r, this.drawStart.c);
          if (existing) {
            this.eraseAt(this.drawStart.r, this.drawStart.c);
          } else {
            this.placeRect(this.drawStart.r, this.drawStart.c, this.drawStart.r, this.drawStart.c);
          }
        } else if (this.preview) {
          this.placeRect(this.preview.r1, this.preview.c1, this.preview.r2, this.preview.c2);
        }
      }
      this.mode = 'idle';
      this.drawStart = null;
      this.drawCurrent = null;
      this.preview = null;
      this.pointerDownPos = null;
      this.render();
    });

    c.addEventListener('mouseleave', e => {
      if (this.mode === 'draw' && this.preview) {
        this.placeRect(this.preview.r1, this.preview.c1, this.preview.r2, this.preview.c2);
      }
      this.mode = 'idle';
      this.drawStart = null;
      this.preview = null;
      this.render();
    });

    // Right-click → erase
    c.addEventListener('contextmenu', e => {
      e.preventDefault();
      const pos = this._evPos(e);
      const cell = this._screenToCell(pos.x, pos.y);
      if (cell) this.eraseAt(cell.r, cell.c);
    });

    // Scroll wheel → zoom (desktop)
    c.addEventListener('wheel', e => {
      e.preventDefault();
      const pos = this._evPos(e);
      this.zoomAt(e.deltaY < 0 ? 1.12 : 1/1.12, pos.x, pos.y);
    }, {passive: false});

    // ── Touch ──
    let lastTouches = null;

    c.addEventListener('touchstart', e => {
      e.preventDefault();
      const ts = e.touches;

      if (ts.length === 1 && !this.solved) {
        const pos = this._evPos(e, ts[0]);
        this.pointerDownPos = pos;
        this.pointerMoved = false;
        lastTouches = null;

        const cell = this._screenToCell(pos.x, pos.y);
        if (!cell) return;

        // Click on invalid rect → erase
        const existing = this._rectAt(cell.r, cell.c);
        if (existing && !this._rectIsValid(existing)) {
          this.eraseAt(cell.r, cell.c);
          this.pointerDownPos = null;
          return;
        }

        this.mode = 'draw';
        this.drawStart = cell;
        this.drawCurrent = cell;
        this.preview = {r1:cell.r,c1:cell.c,r2:cell.r,c2:cell.c};
        this.render();

      } else if (ts.length === 2) {
        // Two fingers → switch to pinch/pan mode
        this.mode = 'pan';
        this.drawStart = null;
        this.preview = null;
        lastTouches = [{x:ts[0].clientX,y:ts[0].clientY},{x:ts[1].clientX,y:ts[1].clientY}];
        this.render();
      }
    }, {passive: false});

    c.addEventListener('touchmove', e => {
      e.preventDefault();
      const ts = e.touches;

      if (ts.length === 2) {
        // Pinch zoom + pan
        this.mode = 'pan';
        this.preview = null;
        const cur = [{x:ts[0].clientX,y:ts[0].clientY},{x:ts[1].clientX,y:ts[1].clientY}];
        if (lastTouches && lastTouches.length === 2) {
          const rect = this.canvas.getBoundingClientRect();
          const oldD = Math.hypot(lastTouches[0].x-lastTouches[1].x, lastTouches[0].y-lastTouches[1].y);
          const newD = Math.hypot(cur[0].x-cur[1].x, cur[0].y-cur[1].y);
          const midX = (cur[0].x+cur[1].x)/2 - rect.left;
          const midY = (cur[0].y+cur[1].y)/2 - rect.top;
          if (oldD > 1) this.zoomAt(newD/oldD, midX, midY);
          // Pan from midpoint movement
          const oldMidX = (lastTouches[0].x+lastTouches[1].x)/2 - rect.left;
          const oldMidY = (lastTouches[0].y+lastTouches[1].y)/2 - rect.top;
          this.panX += midX - oldMidX;
          this.panY += midY - oldMidY;
          this._clampPan();
          this.render();
        }
        lastTouches = cur;
        return;
      }

      if (ts.length === 1) {
        const pos = this._evPos(e, ts[0]);
        if (this.pointerDownPos) {
          const dx = pos.x - this.pointerDownPos.x;
          const dy = pos.y - this.pointerDownPos.y;
          if (Math.hypot(dx,dy) > 5) this.pointerMoved = true;
        }

        if (this.mode === 'draw' && this.drawStart) {
          const cell = this._screenToCell(pos.x, pos.y);
          if (cell) {
            this.drawCurrent = cell;
            this.preview = {
              r1:Math.min(this.drawStart.r,cell.r), c1:Math.min(this.drawStart.c,cell.c),
              r2:Math.max(this.drawStart.r,cell.r), c2:Math.max(this.drawStart.c,cell.c)
            };
            this.render();
          }
        }
      }
    }, {passive: false});

    c.addEventListener('touchend', e => {
      e.preventDefault();
      if (e.touches.length === 0) {
        if (this.mode === 'draw' && this.drawStart) {
          if (!this.pointerMoved) {
            // Tap — erase if rect exists here, otherwise place 1×1
            const existing = this._rectAt(this.drawStart.r, this.drawStart.c);
            if (existing) {
              this.eraseAt(this.drawStart.r, this.drawStart.c);
            } else {
              this.placeRect(this.drawStart.r, this.drawStart.c, this.drawStart.r, this.drawStart.c);
            }
          } else if (this.preview) {
            this.placeRect(this.preview.r1, this.preview.c1, this.preview.r2, this.preview.c2);
          }
        }
        this.mode = 'idle';
        this.drawStart = null;
        this.preview = null;
        this.pointerDownPos = null;
        lastTouches = null;
        this.render();
      } else if (e.touches.length === 1) {
        // One finger lifted from two-finger gesture → reset to idle
        this.mode = 'idle';
        lastTouches = null;
      }
    }, {passive: false});
  }

  // ── Render ──
  render() {
    const ctx = this.ctx;
    const {rows, cols, clues} = this.puzzle;
    const W = this._W, H = this._H;
    const cs = BASE_CELL;
    const dk = window.matchMedia('(prefers-color-scheme: dark)').matches;

    const C = dk ? {
      bg:'#111110', grid:'rgba(255,255,255,0.07)', gridB:'rgba(255,255,255,0.2)',
      clue:'#f0ede0', rf:'rgba(180,160,100,0.16)', rs:'rgba(210,185,110,0.85)',
      ef:'rgba(200,70,70,0.13)', es:'rgba(220,80,80,0.7)',
      pf:'rgba(160,145,100,0.22)', ps:'rgba(200,180,100,0.6)',
      sf:'rgba(70,160,95,0.18)', ss:'rgba(70,190,110,0.85)',
    } : {
      bg:'#faf9f5', grid:'rgba(0,0,0,0.07)', gridB:'rgba(0,0,0,0.22)',
      clue:'#1a1916', rf:'rgba(130,105,35,0.1)', rs:'rgba(100,78,22,0.75)',
      ef:'rgba(195,55,55,0.09)', es:'rgba(195,55,55,0.65)',
      pf:'rgba(100,85,40,0.14)', ps:'rgba(100,78,22,0.5)',
      sf:'rgba(45,135,75,0.13)', ss:'rgba(45,135,75,0.7)',
    };

    // Background
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, W, H);

    // Apply zoom/pan transform
    ctx.save();
    ctx.translate(this.panX, this.panY);
    ctx.scale(this.zoom, this.zoom);

    const PW = cols * cs, PH = rows * cs;

    // Fill puzzle background
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, PW, PH);

    // Draw placed rects
    for (const p of this.playerRects) {
      const valid = this._rectIsValid(p);
      const fill = this.solved ? C.sf : (valid ? C.rf : C.ef);
      const stroke = this.solved ? C.ss : (valid ? C.rs : C.es);
      const x=p.c1*cs, y=p.r1*cs, w=(p.c2-p.c1+1)*cs, h=(p.r2-p.r1+1)*cs;
      ctx.fillStyle = fill;
      ctx.fillRect(x+1, y+1, w-2, h-2);
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 2 / this.zoom;
      ctx.strokeRect(x+1.5/this.zoom, y+1.5/this.zoom, w-3/this.zoom, h-3/this.zoom);
    }

    // Draw preview
    if (this.preview) {
      const {r1,c1,r2,c2} = this.preview;
      const x=c1*cs, y=r1*cs, w=(c2-c1+1)*cs, h=(r2-r1+1)*cs;
      const area = (c2-c1+1)*(r2-r1+1);
      ctx.fillStyle = C.pf;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = C.ps;
      ctx.lineWidth = 2 / this.zoom;
      ctx.setLineDash([5/this.zoom, 3/this.zoom]);
      ctx.strokeRect(x+1/this.zoom, y+1/this.zoom, w-2/this.zoom, h-2/this.zoom);
      ctx.setLineDash([]);

      // Area count label
      const lfs = Math.max(cs * 0.55, 14);
      ctx.font = `700 ${lfs}px "DM Mono",monospace`;
      const tw = ctx.measureText(String(area)).width;
      const lx = x+w/2, ly = y+h/2;
      const pad = lfs * 0.3;
      ctx.fillStyle = dk ? 'rgba(20,18,14,0.85)' : 'rgba(250,249,245,0.9)';
      ctx.beginPath();
      ctx.roundRect(lx-tw/2-pad, ly-lfs/2-pad*0.8, tw+pad*2, lfs+pad*1.6, 4);
      ctx.fill();
      ctx.fillStyle = dk ? '#c4a565' : '#7a6030';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(area), lx, ly);
    }

    // Grid lines
    ctx.strokeStyle = C.grid;
    ctx.lineWidth = 0.5 / this.zoom;
    for (let r=0; r<=rows; r++) {
      if (r%5===0) continue;
      ctx.beginPath(); ctx.moveTo(0,r*cs); ctx.lineTo(PW,r*cs); ctx.stroke();
    }
    for (let c=0; c<=cols; c++) {
      if (c%5===0) continue;
      ctx.beginPath(); ctx.moveTo(c*cs,0); ctx.lineTo(c*cs,PH); ctx.stroke();
    }
    // Bold lines every 5
    ctx.strokeStyle = C.gridB;
    ctx.lineWidth = 1 / this.zoom;
    for (let r=0; r<=rows; r++) {
      if (r%5!==0) continue;
      ctx.beginPath(); ctx.moveTo(0,r*cs); ctx.lineTo(PW,r*cs); ctx.stroke();
    }
    for (let c=0; c<=cols; c++) {
      if (c%5!==0) continue;
      ctx.beginPath(); ctx.moveTo(c*cs,0); ctx.lineTo(c*cs,PH); ctx.stroke();
    }
    // Border
    ctx.strokeStyle = C.gridB;
    ctx.lineWidth = 2 / this.zoom;
    ctx.strokeRect(0, 0, PW, PH);

    // Clue numbers — always rendered at BASE_CELL size, crisp at any zoom
    const fs = Math.round(cs * 0.48);
    ctx.font = `600 ${fs}px "DM Mono",monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = C.clue;
    for (let r=0; r<rows; r++) {
      for (let c=0; c<cols; c++) {
        if (clues[r][c] > 0) {
          ctx.fillText(clues[r][c], c*cs+cs/2, r*cs+cs/2);
        }
      }
    }

    ctx.restore();
  }
}

// ── PAGE LOGIC ───────────────────────────────────────────────────────────────
let game = null, timerInterval = null, puzzleIndex = 1;
function fmtTime(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}

function loadPuzzle(rows, cols, name, isNew) {
  if (isNew) puzzleIndex++;
  const seed = Math.floor(Math.random() * 1e9) + 1;
  const puzzle = generatePuzzle(rows, cols, seed);
  const canvas = document.getElementById('game-canvas');
  const wrap = document.getElementById('canvas-wrap');
  game = new ShikakuGame(puzzle, canvas, wrap);
  document.getElementById('diff-badge').textContent = name;
  document.getElementById('puzzle-counter').textContent = `Puzzle #${puzzleIndex}`;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    document.getElementById('timer').textContent = fmtTime(Math.floor((Date.now()-game.startTime)/1000));
  }, 500);
  game.onSolve = elapsed => {
    clearInterval(timerInterval);
    document.getElementById('timer').textContent = fmtTime(elapsed);
    document.getElementById('win-time').textContent = fmtTime(elapsed);
    document.getElementById('win-desc').textContent = `${rows}×${cols} puzzle solved`;
    setTimeout(() => document.getElementById('win-overlay').classList.add('show'), 600);
  };
}

document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    puzzleIndex = 0;
    loadPuzzle(+btn.dataset.rows, +btn.dataset.cols, btn.dataset.name, true);
  });
});

document.getElementById('zoom-in').addEventListener('click', () => game?.zoomIn());
document.getElementById('zoom-out').addEventListener('click', () => game?.zoomOut());
document.getElementById('zoom-fit').addEventListener('click', () => game?.fitToScreen());
document.getElementById('reset-btn').addEventListener('click', () => game?.reset());
document.getElementById('new-btn').addEventListener('click', () => {
  const a = document.querySelector('.size-btn.active');
  loadPuzzle(+a.dataset.rows, +a.dataset.cols, a.dataset.name, true);
});
document.getElementById('win-next').addEventListener('click', () => {
  document.getElementById('win-overlay').classList.remove('show');
  const a = document.querySelector('.size-btn.active');
  loadPuzzle(+a.dataset.rows, +a.dataset.cols, a.dataset.name, true);
});
document.getElementById('win-share').addEventListener('click', () => {
  const elapsed = Math.floor((Date.now() - game.startTime) / 1000);
  const a = document.querySelector('.size-btn.active');
  const size = `${a.dataset.rows}×${a.dataset.cols}`;
  const text = `⏱️ ${fmtTime(elapsed)} (${size})\nbist du schneller? 🧩 shikaku.ch`;
  const waUrl = `https://wa.me/?text=${encodeURIComponent(text)}`;
  if (navigator.share) navigator.share({text});
  else window.open(waUrl, '_blank');
});
document.getElementById('win-close').addEventListener('click', () => document.getElementById('win-overlay').classList.remove('show'));
document.getElementById('win-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) e.currentTarget.classList.remove('show'); });
window.addEventListener('resize', () => game?.resize());

loadPuzzle(10, 10, 'Classic', false);
</script>
